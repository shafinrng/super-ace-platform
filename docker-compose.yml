version: "3.9"

services:
  # ﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬ Infrastructure ﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬ
  redis:
    image: redis:7-alpine
    container_name: superace_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: superace_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: superace
      POSTGRES_PASSWORD: superace123
      POSTGRES_DB: superace_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mongodb:
    image: mongo:7-jammy
    container_name: superace_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬ Core Services ﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬ
  auth-service:
    build: ./services/auth-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://superace:superace123@postgres:5432/superace_db
      - JWT_SECRET=superace-docker-jwt-secret-2024
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  game-engine:
    build: ./services/game-engine
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - JWT_SECRET=superace-docker-jwt-secret-2024
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  wallet-service:
    build: ./services/wallet-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - DATABASE_URL=postgresql://superace:superace123@postgres:5432/superace_db
      - JWT_SECRET=superace-docker-jwt-secret-2024
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  payment-service:
    build: ./services/payment-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - DATABASE_URL=postgresql://superace:superace123@postgres:5432/superace_db
    depends_on:
      - postgres
    restart: unless-stopped

  websocket-service:
    build: ./services/websocket-service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped


  admin-service:
    build: ./services/admin-service
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - JWT_SECRET=superace-docker-jwt-secret-2024
      - DATABASE_URL=postgresql://superace:superace123@postgres:5432/superace_db
      - REDIS_URL=redis://redis:6379
      - GAME_ENGINE_URL=http://game-engine:3002
      - WALLET_SERVICE_URL=http://wallet-service:3003
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
  admin-panel:
    build: ./admin-panel
    ports:
      - "3007:3007"
    environment:
      - PORT=3007
    restart: unless-stopped

  # ﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬ Production v2 Services ﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬ
  session-service:
    build: ./services/session-service
    ports:
      - "3008:3008"
    environment:
      - PORT=3008
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  saga-service:
    build: ./services/saga-service
    ports:
      - "3009:3009"
    environment:
      - PORT=3009
      - REDIS_HOST=redis
      - WALLET_URL=http://wallet-service:3003
      - RNG_URL=http://rng-service:3010
      - GAME_URL=http://game-engine:3002
      - SESSION_URL=http://session-service:3008
      - JACKPOT_URL=http://jackpot-service:3011
    depends_on:
      - redis
      - wallet-service
      - rng-service
      - game-engine
      - session-service
      - jackpot-service
    restart: unless-stopped

  rng-service:
    build: ./services/rng-service
    ports:
      - "3010:3010"
    environment:
      - PORT=3010
      - REDIS_HOST=redis
      - CLIENT_URL=http://frontend:3000
    depends_on:
      - redis
    restart: unless-stopped

  jackpot-service:
    build: ./services/jackpot-service
    ports:
      - "3011:3011"
    environment:
      - PORT=3011
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped

  buybonus-service:
    build: ./services/buybonus-service
    ports:
      - "3012:3012"
    environment:
      - PORT=3012
      - WALLET_URL=http://wallet-service:3003
      - RNG_URL=http://rng-service:3010
      - SESSION_URL=http://session-service:3008
    depends_on:
      - wallet-service
      - rng-service
      - session-service
    restart: unless-stopped

  notification-service:
    build: ./services/notification-service
    ports:
      - "3013:3013"
    environment:
      - PORT=3013
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  kyc-service:
    build: ./services/kyc-service
    ports:
      - "3014:3014"
    environment:
      - PORT=3014
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  audit-service:
    build: ./services/audit-service
    ports:
      - "3015:3015"
    environment:
      - PORT=3015
      - POSTGRES_HOST=postgres
      - SERVICE_KEY=superace_audit_key_2026
      - REGULATOR_KEY=superace_regulator_key_2026
    depends_on:
      - postgres
    restart: unless-stopped

  responsible-gaming-service:
    build: ./services/responsible-gaming-service
    ports:
      - "3016:3016"
    environment:
      - PORT=3016
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - ADMIN_KEY=superace_admin_key_2026
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # ﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬ Frontend ﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬﾃδ｢ﾃ｢竄ｬﾂ敕｢窶堋ｬ
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  mongo_data:



