# docker-compose.override.yml
# Auto-loaded by "docker compose up" alongside docker-compose.yml.
# Adds live bind-mounts + ts-node-dev for fast local iteration.
# docker-compose.yml itself stays production-clean for VPS deployment.

services:
  auth-service:
    volumes:
      - ./services/auth-service/src:/app/src
    command: npx ts-node-dev --respawn --transpile-only --poll src/index.ts
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000

  game-engine:
    volumes:
